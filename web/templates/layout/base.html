<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}{{.AppName}}{{end}}</title>
    <meta name="description" content="Платформа совместных поездок в офис для сотрудников">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/js/tailwind.config.js"></script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.0/dist/cdn.min.js"></script>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Global Styles -->
    <link rel="stylesheet" href="/static/css/base.css?v=1.0.2">

    {{block "head" .}}{{end}}
</head>
<body x-data="{ notification: null, notifType: 'success' }"
      @notify.window="notification = $event.detail.message; notifType = $event.detail.type; setTimeout(() => notification = null, 4000)">

    {{template "nav.html" .}}

    <!-- Toast уведомление -->
    <div x-show="notification"
         x-cloak
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-2"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="toast-notification"
         :class="'toast-' + notifType">
        <div class="toast-content">
            <div class="toast-icon-container">
                <template x-if="notifType === 'error'">
                    <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>
                </template>
                <template x-if="notifType !== 'error'">
                    <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
                </template>
            </div>
            <p x-text="notification" class="toast-text"></p>
        </div>
    </div>

    <main class="main-content">
        {{block "content" .}}{{end}}
    </main>

    <footer class="page-footer">
        <div class="page-footer-container">
            © {{.Year}} {{.AppName}}. Экономьте время и деньги — едьте вместе.
        </div>
    </footer>

    {{block "scripts" .}}{{end}}

</body>
</html>
